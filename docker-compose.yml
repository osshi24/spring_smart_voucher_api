services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_voucher_db
    environment:
      POSTGRES_DB: smart_voucher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_voucher"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: smart_voucher_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_voucher
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-smartvoucher-secret-key-must-be-at-least-256-bits-long-for-hs256}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
