spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_voucher
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    test-connection: false
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long
  access-expiration: 3600000
  refresh-expiration: 86400000

logging:
  level:
    com.smartvoucher: WARN
    org.flywaydb: WARN
