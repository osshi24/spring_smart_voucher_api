spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_voucher
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

logging:
  level:
    com.smartvoucher: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
