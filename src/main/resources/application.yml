spring:
  application:
    name: smart-voucher

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:smartvoucher-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-expiration: ${JWT_ACCESS_EXPIRATION:86400000000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:60480000000}

server:
  port: 8080
  forward-headers-strategy: native
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

scheduler:
  voucher-expiry:
    cron: "0 0 1 * * ?"

rate-limit:
  jwt:
    requests-per-minute: 60

webhook:
  max-retries: 3
  connect-timeout-ms: 5000

api-key:
  max-per-merchant: 10