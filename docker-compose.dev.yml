# Dev infra only: PostgreSQL + Redis
# Run: docker compose -f docker-compose.dev.yml up -d
# Then start Spring Boot locally: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=dev"
services:
  postgres:
    image: postgres:16-alpine
    container_name: smart_voucher_db
    environment:
      POSTGRES_DB: smart_voucher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_voucher"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_voucher_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
